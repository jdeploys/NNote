name: desktop-release-0.0.1

on:
  workflow_dispatch:
  push:
    tags: ['v0.0.1']

permissions:
  contents: write

jobs:
  windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - name: Package unsigned Windows x64
        run: npm run package:win:x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - name: Verify packaged Windows runtime
        run: node scripts/verify-package.mjs dist/win-unpacked
      - name: Normalize release asset
        run: node scripts/prepare-release-assets.mjs .exe Nnote-0.0.1-windows-x64.exe
      - uses: actions/upload-artifact@v4
        with:
          name: release-windows-x64
          path: release-assets/Nnote-0.0.1-windows-x64.exe
          if-no-files-found: error

  macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
            app-dir: dist/mac/Nnote.app
          - arch: arm64
            runner: macos-15
            app-dir: dist/mac-arm64/Nnote.app
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - name: Package unsigned macOS ${{ matrix.arch }}
        run: npm run package:mac:${{ matrix.arch }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - name: Verify packaged macOS runtime
        run: node scripts/verify-package.mjs "${{ matrix.app-dir }}"
      - name: Verify native architecture
        run: |
          file "${{ matrix.app-dir }}/Contents/MacOS/Nnote"
          file "${{ matrix.app-dir }}/Contents/Resources/app.asar.unpacked/node_modules/better-sqlite3/build/Release/better_sqlite3.node"
      - name: Normalize release asset
        run: node scripts/prepare-release-assets.mjs .dmg Nnote-0.0.1-macos-${{ matrix.arch }}.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: release-macos-${{ matrix.arch }}
          path: release-assets/Nnote-0.0.1-macos-${{ matrix.arch }}.dmg
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v0.0.1')
    needs: [windows-x64, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true
      - name: Verify complete asset set and checksums
        working-directory: release-assets
        run: |
          test -f Nnote-0.0.1-windows-x64.exe
          test -f Nnote-0.0.1-macos-x64.dmg
          test -f Nnote-0.0.1-macos-arm64.dmg
          sha256sum Nnote-0.0.1-windows-x64.exe Nnote-0.0.1-macos-x64.dmg Nnote-0.0.1-macos-arm64.dmg > SHA256SUMS.txt
      - name: Publish unsigned prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create v0.0.1 release-assets/Nnote-0.0.1-windows-x64.exe
          release-assets/Nnote-0.0.1-macos-x64.dmg release-assets/Nnote-0.0.1-macos-arm64.dmg
          release-assets/SHA256SUMS.txt --repo "${{ github.repository }}" --prerelease
          --title "Nnote 0.0.1" --notes "First public Nnote desktop prerelease. These builds are unsigned and unnotarized; Windows SmartScreen and macOS Gatekeeper may warn before launch."
